    flashes:
      company_created: "Empresa criada! Agora crie seu primeiro projeto."
      project_created: "Projeto criado! Agora lance sua primeira tarefa."
      completed: "Configuração concluída! 🎉 Sua primeira tarefa foi criada."

  activerecord:
    errors:
      messages:
        record_invalid: "A validação falhou: %{errors}"
    models:
      company: Empresa
      user: Usuário
    attributes:
